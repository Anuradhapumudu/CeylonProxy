<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CeylonProxy — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0e1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(6,182,212,0.08) 0%, transparent 50%);
            z-index: 0;
        }
        .login-card {
            position: relative; z-index: 1;
            background: rgba(15,20,40,0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 20px;
            padding: 48px 40px;
            width: 420px;
            max-width: 90vw;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 40px rgba(99,102,241,0.1);
        }
        .logo {
            text-align: center; margin-bottom: 32px;
        }
        .logo-icon {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 16px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 28px; margin-bottom: 14px; color: #fff;
            box-shadow: 0 8px 24px rgba(99,102,241,0.3);
        }
        .logo h1 {
            font-size: 22px; font-weight: 700;
            background: linear-gradient(135deg, #c7d2fe, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo p { color: #64748b; font-size: 13px; margin-top: 4px; }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 500;
            color: #94a3b8; margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: #475569; font-size: 16px;
        }
        .form-group input {
            width: 100%; padding: 12px 16px 12px 42px;
            background: rgba(30,41,59,0.8);
            border: 1px solid rgba(99,102,241,0.15);
            border-radius: 12px;
            color: #e2e8f0; font-size: 14px;
            transition: all 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        .form-group input:focus + i,
        .input-wrapper:focus-within i { color: #818cf8; }
        .form-group input::placeholder { color: #475569; }
        .btn-login {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none; border-radius: 12px;
            color: #fff; font-size: 15px; font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(99,102,241,0.4);
        }
        .btn-login:active { transform: translateY(0); }
        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            padding: 10px 14px;
            border-radius: 10px;
            color: #fca5a5; font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .footer {
            text-align: center; margin-top: 24px;
            color: #475569; font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon"><i class="bi bi-shield-lock-fill"></i></div>
            <h1>CeylonProxy</h1>
            <p>Secure VPN Management</p>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="error-msg"><i class="bi bi-exclamation-triangle-fill"></i> {{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <input type="text" name="username" placeholder="Enter username" required autofocus>
                    <i class="bi bi-person-fill"></i>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" name="password" placeholder="Enter password" required>
                    <i class="bi bi-lock-fill"></i>
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Sign In
            </button>
        </form>
        <div class="footer">CeylonProxy v3.1 • Secure & Optimized</div>
    </div>
</body>
</html>
