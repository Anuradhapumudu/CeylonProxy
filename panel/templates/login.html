<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CeylonProxy — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #020617;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Mesh Gradient Background */
        .premium-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #020617;
        }

        .premium-bg::before,
        .premium-bg::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: pulse-slow 12s alternate infinite ease-in-out;
        }

        .premium-bg::before {
            width: 600px;
            height: 600px;
            background: rgba(99, 102, 241, 0.15);
            top: -200px;
            left: -100px;
        }

        .premium-bg::after {
            width: 700px;
            height: 700px;
            background: rgba(14, 165, 233, 0.12);
            bottom: -300px;
            right: -200px;
            animation-delay: -6s;
        }

        @keyframes pulse-slow {
            0% {
                transform: scale(1) translate(0, 0);
                opacity: 0.7;
            }

            50% {
                transform: scale(1.1) translate(20px, 40px);
                opacity: 1;
            }

            100% {
                transform: scale(0.9) translate(-20px, -20px);
                opacity: 0.8;
            }
        }

        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 50px 48px;
            width: 440px;
            max-width: 92vw;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(20px);
            animation: slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slide-up {
            to {
                transform: translateY(0);
                opacity: 1;
            }

            from {
                opacity: 0;
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #fff;
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: #64748b;
            font-size: 14px;
            margin-top: 6px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
            font-size: 18px;
            transition: color 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #f8fafc;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus {
            background: rgba(30, 41, 59, 0.8);
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .form-group input:focus+i,
        .input-wrapper:focus-within i {
            color: #818cf8;
        }

        .form-group input::placeholder {
            color: #475569;
            font-weight: 400;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            margin-top: 12px;
            background: linear-gradient(135deg, #4f46e5, #0ea5e9);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-login::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-login:hover::after {
            left: 100%;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 12px 16px;
            border-radius: 12px;
            color: #fca5a5;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
            animation: shake 0.4s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            color: #475569;
            font-size: 12px;
            font-weight: 500;
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body>
    <div class="premium-bg"></div>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon"><i class="bi bi-shield-lock-fill"></i></div>
            <h1>CeylonProxy</h1>
            <p>Premium VPN Gateway</p>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="error-msg"><i class="bi bi-exclamation-triangle-fill"></i> {{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>USERNAME</label>
                <div class="input-wrapper">
                    <input type="text" name="username" placeholder="Enter admin username" required autofocus
                        autocomplete="off">
                    <i class="bi bi-person-fill"></i>
                </div>
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <div class="input-wrapper">
                    <input type="password" name="password" placeholder="Enter admin password" required>
                    <i class="bi bi-shield-lock"></i>
                </div>
            </div>
            <button type="submit" class="btn-login">
                Sign In <i class="bi bi-arrow-right"></i>
            </button>
        </form>
        <div class="footer">CeylonProxy Enterprise • v3.2</div>
    </div>
</body>

</html>
